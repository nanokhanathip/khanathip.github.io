<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khanathip | Developer</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <header class="hero">

      <div class="profile-wrapper">
        <img src="profile.png" alt="Profile Photo" class="profile-img">
      </div>

      <h1 id="name"></h1>

      <div class="personal-info">
        <p><strong>Nickname:</strong> <span id="nickname"></span></p>
        <p><strong>Age:</strong> <span id="age"></span> Year</p>
        <p><strong>Birthday:</strong> <span id="birthdate"></span></p>
      </div>

      <p class="title" id="title"></p>
      <p class="summary" id="summary"></p>

    </header>

    <section>
      <h2>Education</h2>
      <div id="education" class="skills-grid"></div>
    </section>

    <section>
      <h2>Skills</h2>
      <div id="skills" class="skills-grid"></div>
    </section>

    <section>
      <h2>Experience</h2>
      <div id="experience" class="skills-grid"> </div>
    </section>

    <section>
      <h2>Project</h2>
      <div id="projects" class="projects-grid"></div>
    </section>

    <section>
      <h2>Contact</h2>
      <div id="contact" class="skills-grid"></div>
    </section>

  </div>

  <script src="script.js"></script>
</body>

<footer class="main-footer">
  <div class="footer-container">
    <p>© 2026 Khanathip Thuennao. All rights reserved.</p>
    <div class="footer-links">
      <a href="https://github.com/nanokhanathip" target="_blank">GitHub</a>

    </div>
  </div>
</footer>

</html>
